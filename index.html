<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5A TRACKER LIVE - Local Independent</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@500;600;800&display=swap');

        :root {
            --bg-darker: #020617;
            --bg-sidebar: #0f172a;
            --issue-orange: #fb923c;
            --highlight-yellow: #facc15;
            --tracking-red: #ef4444;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-darker);
            color: #f8fafc;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            letter-spacing: -0.025em;
            overflow: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .dismissed-scroll-container {
            max-height: 250px;
            overflow-y: auto;
            padding-right: 2px;
        }

        @keyframes blink-yellow {

            0%,
            100% {
                opacity: 1;
                transform: scale(1.1);
            }

            50% {
                opacity: 0.3;
                transform: scale(0.8);
            }
        }

        @keyframes blink-red {

            0%,
            100% {
                opacity: 1;
                transform: scale(1.3);
                filter: blur(0.5px);
            }

            50% {
                opacity: 0.2;
                transform: scale(0.7);
            }
        }

        .animate-blink-yellow {
            animation: blink-yellow 0.8s infinite;
            background-color: #facc15;
            box-shadow: 0 0 8px #facc15;
        }

        .animate-blink-red {
            animation: blink-red 0.6s infinite;
            background-color: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        @keyframes highlight-blink {

            0%,
            100% {
                border-color: var(--highlight-yellow);
                box-shadow: 0 0 30px rgba(250, 204, 21, 0.8), inset 0 0 10px rgba(250, 204, 21, 0.2);
                border-width: 3px;
                transform: scale(1.05);
                z-index: 50;
            }

            50% {
                border-color: rgba(250, 204, 21, 0.5);
                box-shadow: 0 0 10px rgba(250, 204, 21, 0.2);
                border-width: 3px;
                transform: scale(1.0);
                z-index: 50;
            }
        }

        .animate-search-highlight {
            animation: highlight-blink 0.8s infinite ease-in-out !important;
            z-index: 50 !important;
            position: relative;
        }

        .text-sharp {
            text-shadow: 0 1px 1.5px rgba(0, 0, 0, 0.5);
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(3px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-action-btn {
            height: 32px;
            padding: 0 12px;
            font-size: 11px;
            font-weight: 800;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            white-space: nowrap;
            letter-spacing: -0.05em;
            border: 1px solid transparent;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }

        .header-action-btn:active {
            transform: scale(0.95);
        }

        .header-action-btn:hover {
            filter: brightness(1.1);
        }

        .toolbar-btn {
            height: 26px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            border: 1px solid #1e293b;
            background: #0f172a;
            color: #94a3b8;
            transition: all 0.15s;
            cursor: pointer;
            font-size: 10px;
            font-weight: 800;
        }

        .toolbar-btn:hover {
            border-color: #ef4444;
            background: #1e293b;
            color: #f8fafc;
        }

        .toolbar-btn.active {
            border-color: #ef4444;
            background: #450a0a;
            color: white;
        }

        .rich-editor {
            background: #020617;
            color: #e2e8f0;
            padding: 1rem;
            outline: none;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }

        .rich-editor b,
        .rich-editor strong {
            font-weight: 800;
            color: white;
        }

        input[type="date"] {
            color-scheme: dark;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            display: block;
            cursor: pointer;
            filter: invert(1) brightness(2) !important;
            opacity: 0.9;
            transition: all 0.2s;
        }

        .seat-vacant {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px dashed rgba(51, 65, 85, 0.9);
        }

        .seat-selected {
            border-color: #facc15 !important;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.5), inset 0 0 10px rgba(250, 204, 21, 0.2);
            transform: scale(1.03);
            z-index: 20;
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;
        // ==========================================
        // [1] SUPABASE CONFIGURATION
        // ==========================================
        const SUPABASE_URL = 'https://pingkpmsnbqpudphipke.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpbmdrcG1zbmJxcHVkcGhpcGtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDczOTMsImV4cCI6MjA4ODIyMzM5M30.S8I76NezOFMoKxWjo4qWIeq4bt95PalHQDyrosDOLUs';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const toDbRow = (s) => ({
            seat_id: s.seatId, raw_name: s.rawName || '', schedules: s.schedules || [],
            memo: s.memo || '', issue_memo: s.issueMemo || '', link_url: s.linkUrl || '',
            next_payment_date: s.nextPaymentDate || null, is_manual_off: s.isManualOff || false,
            is_returned_today: s.isReturnedToday || false, is_dismissed_today: s.isDismissedToday || false,
            memo_icons: s.memoIcons || [],
            arrival_schedule: s.arrivalSchedule || [],
            is_arrived_today: s.isArrivedToday || false
        });
        const bulkSave = async (students) => {
            const { error } = await supabase.from('tracker_seats').upsert(students.map(toDbRow), { onConflict: 'seat_id' });
            if (error) console.error('Supabase bulk save error:', error);
        };
        // ==========================================
        // [2] Global Logic (HOISTED)
        // ==========================================
        const formatUrl = (url) => {
            if (!url) return "";
            if (!/^https?:\/\//i.test(url)) return `https://${url}`;
            return url;
        };

        const timeToMinutes = (timeStr) => {
            if (!timeStr) return 0;
            const normalized = timeStr.replace(/[;.]/g, ':');
            const [hours, minutes] = normalized.split(':').map(Number);
            return (hours || 0) * 60 + (minutes || 0);
        };

        const DAYS = ['일', '월', '화', '수', '목', '금', '토'];
        const getPaymentStatus = (dateStr, now) => {
            if (!dateStr) return null;
            const targetDate = new Date(dateStr);
            targetDate.setHours(0, 0, 0, 0);
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const diffDays = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));
            if (diffDays < 0) return 'OVERDUE';
            if (diffDays <= 3) return 'SOON';
            return null;
        };

        const IssueLogic = {
            parse: (issueMemo, now) => {
                if (!issueMemo) return [];
                const currentDayChar = DAYS[now.getDay()];
                const lines = issueMemo.split('\n');
                const schedules = [];
                const regex = new RegExp(`@.*\\s+${currentDayChar}\\s+(\\d{1,2}[:;.]\\d{2})\\s*[~-]\\s*(\\d{1,2}[:;.]\\d{2})`);
                for (let line of lines) {
                    const match = line.match(regex);
                    if (match) {
                        schedules.push({ startTime: match[1], endTime: match[2] });
                    }
                }
                return schedules;
            }
        };

        const RegularLogic = {
            parseFromString: (text) => {
                const schedules = [];
                if (!text) return [];
                const pattern = /([월화수목금토일]+)\s*(\d{1,2}[:;.]\d{2}|\d{3,4})\s*[~-]\s*(\d{1,2}[:;.]\d{2}|\d{3,4})/g;
                const normalizeTime = (t) => {
                    const clean = t.replace(/[^0-9]/g, '');
                    if (clean.length === 4) return `${clean.substring(0, 2)}:${clean.substring(2, 4)}`;
                    if (clean.length === 3) return `0${clean.substring(0, 1)}:${clean.substring(1, 3)}`;
                    return t;
                };
                let match;
                while ((match = pattern.exec(text)) !== null) {
                    const days = match[1].split('');
                    const startTime = normalizeTime(match[2]);
                    const endTime = normalizeTime(match[3]);
                    days.forEach(day => { schedules.push({ day, startTime, endTime }); });
                }
                return schedules;
            }
        };

        // ==========================================
        // [2-1] Arrival Schedule Parser
        // ==========================================
        // 지원 포맷:
        //   단일: "월 17:30 / 화 18:00 / 수 X / 금 결석"
        //   연속: "월화수목금토 08:10 / 일 X"
        const parseArrivalSchedule = (text) => {
            if (!text || !text.trim()) return [];
            const result = [];
            const normalize = (t) => t.replace(/[;.]/g, ':');
            // [1단계] 결석 패턴: 연속요일 + X/x/결석
            const absentPattern = /([월화수목금토일]+)\s*[:：]?\s*(?:X|x|결석)/g;
            let m;
            while ((m = absentPattern.exec(text)) !== null) {
                m[1].split('').forEach(day => {
                    if (!result.find(r => r.day === day))
                        result.push({ day, arrivalTime: null, isAbsent: true });
                });
            }
            // [2단계] 등원시간 패턴: 연속요일 + 시간
            const timePattern = /([월화수목금토일]+)\s*[:：]?\s*(\d{1,2}[:;.]\d{2})/g;
            while ((m = timePattern.exec(text)) !== null) {
                const arrivalTime = normalize(m[2]);
                m[1].split('').forEach(day => {
                    // 이미 결석으로 등록된 요일은 건너뜀
                    if (!result.find(r => r.day === day))
                        result.push({ day, arrivalTime, isAbsent: false });
                });
            }
            return result;
        };

        const calculateStatus = (student, now) => {
            if (!student.rawName) return "EMPTY";
            if (student.isManualOff) return "MANUAL_OFF";
            if (student.isDismissedToday) return "DISMISSED";

            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            const currentDay = DAYS[now.getDay()];
            // Rank 2: Issue Schedule
            const issues = IssueLogic.parse(student.issueMemo, now);
            let issueStatus = null;
            let maxIssueEndMin = 0;

            if (issues.length > 0) {
                for (let sch of issues) {
                    const sMin = timeToMinutes(sch.startTime);
                    const eMin = timeToMinutes(sch.endTime);
                    if (eMin > maxIssueEndMin) maxIssueEndMin = eMin;
                    if (currentMinutes >= sMin - 60 && currentMinutes < sMin) {
                        if (!issueStatus) issueStatus = "I_GOING_SOON";
                    } else if (currentMinutes >= sMin && currentMinutes < eMin) {
                        issueStatus = "I_OUT";
                    }
                }
                if (issueStatus === "I_OUT") return "I_OUT";
            }

            // [FIX] Calculate Regular Status FIRST to check for GOING_SOON priority
            let regularStatus = null;
            const regulars = (student.schedules || []).filter(s => s.day === currentDay);
            let maxRegularEndMin = 0;

            if (regulars.length > 0) {
                for (let sch of regulars) {
                    const startMin = timeToMinutes(sch.startTime);
                    const endMin = timeToMinutes(sch.endTime);
                    const graceEndMin = endMin + 30;
                    if (graceEndMin > maxRegularEndMin) maxRegularEndMin = graceEndMin;
                    if (currentMinutes >= startMin - 60 && currentMinutes < startMin) {
                        if (!regularStatus) regularStatus = "R_GOING_SOON";
                    } else if (currentMinutes >= startMin && currentMinutes < graceEndMin) {
                        regularStatus = "R_OUT";
                    }
                }
            }

            // [CRITICAL FIX] "Going Soon" overrides "Returned"
            // If a new schedule is approaching, we must show them in the list, even if they returned earlier.
            if (regularStatus === "R_GOING_SOON") return "R_GOING_SOON";

            // Rank 3: Returned (Applies if NOT going soon)
            if (student.isReturnedToday) return "RETURNED";

            // ============================================================
            // [NEW] Rank 3.5: Arrival Schedule (NOT_ARRIVED / ABSENT)
            // 이 시점의 보장 조건 (충돌방어):
            //   - MANUAL_OFF, DISMISSED: 이미 위에서 return됨
            //   - I_OUT: 이미 위에서 즉시 return됨 (이슈 외출 중)
            //   - R_GOING_SOON: 이미 위에서 즉시 return됨 (곧 외출, 원내)
            //   - isReturnedToday=true: 바로 위에서 return됨 (복귀완료)
            // 추가 면제 조건 (아래 로직 내):
            //   - issueStatus 존재 (I_GOING_SOON): 이슈 있는 날 = 등원처리
            //   - regularStatus === 'R_OUT': 정규 외출 중 = 이미 등원
            //   - isArrivedToday=true: 수동 등원확인 완료
            //   - arrivalSchedule 비어있음: 기능 미사용 → 기존 로직 100% 유지
            // ============================================================
            const arrSched = student.arrivalSchedule && student.arrivalSchedule.length > 0
                ? student.arrivalSchedule : null;

            if (arrSched) {
                const todayEntry = arrSched.find(a => a.day === currentDay);

                if (todayEntry) {
                    if (todayEntry.isAbsent) {
                        // 명시적 결석일: ABSENT 반환
                        return "ABSENT";
                    }
                    // 등원시간 설정된 날: 미등원 체크
                    // 면제 조건: 이슈상태 있음(I_GOING_SOON) OR R_OUT OR 이미 등원확인
                    const isExempt = !!issueStatus || regularStatus === 'R_OUT' || !!student.isArrivedToday;
                    if (!isExempt) {
                        const arrivalMin = timeToMinutes(todayEntry.arrivalTime);
                        if (currentMinutes >= arrivalMin) { // 유예 없음, 정각부터 즉시
                            return "NOT_ARRIVED";
                        } else {
                            return "PRE_ARRIVAL"; // 등원시간 전: 비활성 회색
                        }
                    }
                }
                // todayEntry 없음 = arrivalSchedule에 등록 안 된 요일
                // → 미설정 요일은 ABSENT 처리 안 함 (명시적 결석만 처리)
            }
            // ============================================================
            // [NEW END]
            // ============================================================

            // Rank 4: Other Issue Status
            if (issueStatus) return issueStatus;
            if (maxIssueEndMin > 0 && currentMinutes >= maxIssueEndMin) return "I_OVERDUE";

            // Rank 5: Regular Schedule (Remaining statuses)
            if (regularStatus) return regularStatus;
            if (maxRegularEndMin > 0 && currentMinutes >= maxRegularEndMin) return "R_OVERDUE";

            return "IDLE";
        };

        const getDisplaySchedule = (student, now) => {
            if (!student.rawName) return null;
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            const currentDay = DAYS[now.getDay()];

            const issues = IssueLogic.parse(student.issueMemo, now);
            if (issues.length > 0) {
                issues.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
                const upcoming = issues.find(s => timeToMinutes(s.endTime) > currentMinutes);
                if (upcoming) return `${upcoming.startTime}~${upcoming.endTime}`;
                return null;
            }
            const regulars = (student.schedules || []).filter(s => s.day === currentDay);
            if (regulars.length > 0) {
                regulars.sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
                const upcoming = regulars.find(s => timeToMinutes(s.endTime) > currentMinutes);
                if (upcoming) return `${upcoming.startTime}~${upcoming.endTime}`;
            }
            return null;
        };
        // ==========================================
        // [3] Components
        // ==========================================
        function Icon({ name, size = 16, className = "", color, fill }) {
            const [svgHtml, setSvgHtml] = useState(null);
            useEffect(() => {
                if (!window.lucide) return;
                const iconName = name.split('-').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join('');
                const iconNode = window.lucide.icons[iconName];
                if (iconNode) {
                    try {
                        const svgElement = window.lucide.createElement(iconNode);
                        svgElement.setAttribute('width', size);
                        svgElement.setAttribute('height', size);
                        svgElement.setAttribute('class', `lucide lucide-${name} ${className}`);
                        if (color) svgElement.setAttribute('stroke', color);
                        if (fill) svgElement.setAttribute('fill', fill);
                        setSvgHtml(svgElement.outerHTML);
                    } catch (e) { console.error(e); }
                }
            }, [name, size, className, color, fill]);
            if (!svgHtml) return <span style={{ width: size, height: size }} className="inline-block" />;
            return <span dangerouslySetInnerHTML={{ __html: svgHtml }} className="inline-flex items-center" />;
        }

        const StudentCard = ({ student, now, onClick, isSelected, isHighlighted }) => {
            const status = calculateStatus(student, now);
            const payStatus = getPaymentStatus(student.nextPaymentDate, now);
            const displayTime = useMemo(() => getDisplaySchedule(student, now), [student, now]);
            const detectedBullets = useMemo(() => {
                const res = [];
                const content = student.memo || "";
                if (content.includes('🔴')) res.push('🔴');
                if (content.includes('⭐')) res.push('⭐');
                if (content.includes('📌')) res.push('📌');
                return res;
            }, [student.memo]);
            const memoIcons = Array.isArray(student.memoIcons) ? student.memoIcons : [];

            let bgClass = "bg-slate-800/60 border-slate-700";
            if (status.includes("OVERDUE")) bgClass = "bg-red-600 border-red-400 text-white shadow-lg";
            else if (status === "I_OUT") bgClass = "bg-blue-600 border-2 border-orange-500 text-white shadow-lg";
            else if (status.includes("OUT")) bgClass = "bg-blue-600 border-blue-500 text-white shadow-lg";
            else if (status.includes("GOING_SOON")) bgClass = "bg-orange-500 border-2 border-orange-300 text-white shadow-lg animate-pulse";
            else if (status === "MANUAL_OFF") bgClass = "bg-slate-400 border-slate-300 text-slate-950 font-black";
            else if (status === "DISMISSED") bgClass = "bg-purple-600 border-purple-500 text-white shadow-lg";
            else if (status === "IDLE" || status === "RETURNED") bgClass = "bg-emerald-600 border-emerald-500 text-white shadow-md";
            // [NEW] 등원시간 관련 상태
            else if (status === "NOT_ARRIVED") bgClass = "bg-amber-900/80 border-2 border-amber-500 text-amber-100 shadow-lg animate-pulse";
            else if (status === "PRE_ARRIVAL") bgClass = "bg-slate-600 border-slate-500 text-slate-300 shadow-md";
            else if (status === "ABSENT") bgClass = "bg-slate-700/70 border-dashed border-slate-500 text-slate-400 opacity-60";

            const showFire = status.startsWith("I_");
            return (
                <div id={`seat-${student.seatId}`} onClick={onClick} className={`relative p-1.5 px-2 rounded-lg border cursor-pointer transition-all h-14 flex flex-col justify-center items-center text-center ${bgClass} ${isSelected ? 'seat-selected' : ''} ${isHighlighted ? 'animate-search-highlight' : ''} hover:brightness-110 active:scale-95 shadow-inner`}>
                    <div className="absolute top-0 left-0 flex items-center z-50">
                        <div className="px-2 py-0.5 rounded-br-lg font-black text-[13px] tracking-tighter bg-black/60 text-white font-mono shadow-md">{student.seatId}</div>
                        {showFire && <span className="ml-1 text-[12px] animate-pulse">🔥</span>}
                        <div className="flex ml-1 gap-0.5">
                            {detectedBullets.map((icon, idx) => (
                                <span key={idx} className="text-[10px] drop-shadow-md select-none">{icon}</span>
                            ))}
                        </div>
                    </div>
                    <div className="absolute top-1 right-1 flex gap-0.5 z-30 items-center">
                        {payStatus === 'OVERDUE' && <div className="w-2.5 h-2.5 rounded-full animate-blink-red"></div>}
                        {payStatus === 'SOON' && <div className="w-2.5 h-2.5 rounded-full animate-blink-yellow"></div>}
                        {memoIcons.includes('CIRCLE') && <div className="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_4px_#ef4444]"></div>}
                        {memoIcons.includes('PIN') && <Icon name="pin" size={9} className="text-red-500 fill-red-500" />}
                    </div>
                    {student.rawName ?
                        (
                            <div className="text-sharp w-full flex flex-col items-center mt-1">
                                <div className="font-semibold text-[11.5px] leading-tight truncate flex items-center gap-1">
                                    {student.rawName}
                                    {student.linkUrl && (
                                        <button onClick={(e) => { e.stopPropagation(); window.open(formatUrl(student.linkUrl), '_blank'); }} className="hover:scale-125 transition-transform">
                                            <Icon name="link" size={9} className="text-cyan-400" />
                                        </button>
                                    )}
                                </div>
                                {displayTime && (
                                    <div className="text-[11px] font-sans font-bold tracking-tight text-slate-100 leading-none mt-1 shadow-sm">
                                        {displayTime}
                                    </div>
                                )}
                            </div>
                        ) : <div className="opacity-30 text-[9px] uppercase font-mono tracking-widest font-bold">Vacant</div>}
                </div>

        };

        const SidebarSection = ({ title, data, onAction, now }) => {
            const themes = {
                'ISSUE LIST': 'text-yellow-500 bg-yellow-500/10 border-yellow-500',
                'OVERDUE': 'text-red-500 bg-red-500/20 border-red-500',
                'OUT NOW': 'text-blue-500 bg-blue-500/10 border-blue-500',
                'SCHEDULED': 'text-orange-400 bg-orange-400/15 border-orange-400',
                'DISMISSED': 'text-purple-500 bg-purple-500/10 border-purple-500',
                'NOT ARRIVED': 'text-amber-400 bg-amber-400/15 border-amber-400',   // [NEW]
                'ABSENT': 'text-slate-500 bg-slate-500/10 border-slate-500'          // [NEW]
            };
            const theme = themes[title] || 'text-slate-500 bg-slate-500/10 border-slate-500';

            const getSidebarTime = (student) => {
                if (!student.rawName) return null;
                const currentMinutes = now.getHours() * 60 + now.getMinutes();

                if (title === 'OVERDUE') {
                    const issues = IssueLogic.parse(student.issueMemo, now);
                    const passedIssues = issues.filter(s => timeToMinutes(s.endTime) <= currentMinutes);
                    if (passedIssues.length > 0) {
                        const last = passedIssues[passedIssues.length - 1];
                        return `${last.startTime}~${last.endTime}`;
                    }
                    const regulars = (student.schedules || []).filter(s => s.day === DAYS[now.getDay()]);
                    const passedRegulars = regulars.filter(s => timeToMinutes(s.endTime) + 30 <= currentMinutes);
                    if (passedRegulars.length > 0) {
                        const last = passedRegulars[passedRegulars.length - 1];
                        return `${last.startTime}~${last.endTime}`;
                    }
                }

                if (title === 'SCHEDULED') {
                    const issues = IssueLogic.parse(student.issueMemo, now);
                    const upcomingIssue = issues.find(s => timeToMinutes(s.startTime) > currentMinutes);
                    if (upcomingIssue) return `${upcomingIssue.startTime}~${upcomingIssue.endTime}`;
                    const regulars = (student.schedules || []).filter(s => s.day === DAYS[now.getDay()]);
                    const upcomingRegular = regulars.find(s => timeToMinutes(s.startTime) > currentMinutes);
                    if (upcomingRegular) return `${upcomingRegular.startTime}~${upcomingRegular.endTime}`;
                }

                return getDisplaySchedule(student, now);
            };

            return (
                <div className="mb-6 px-1 font-bold">
