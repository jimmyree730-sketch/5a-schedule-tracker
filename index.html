                    <div className={`space-y-1 ${title === 'DISMISSED' ? 'max-h-[135px] overflow-y-auto pr-1' : ''}`}>
                        {data.map(s => {
                            const timeStr = getSidebarTime(s);
                            const status = calculateStatus(s, now);

                            // --------------------------------------------------------
                            // [RED ZONE] VISUAL LOGIC START
                            // --------------------------------------------------------
                            let itemClass = "flex items-center gap-3 p-1 px-3 rounded-md border shadow-md text-sharp font-bold transition-all ";

                            if (status === 'I_OUT') {
                                // [CRITICAL] Issue Out styling override (Blue BG + Orange Border)
                                itemClass += "bg-blue-900/40 border border-orange-500 text-blue-100 shadow-[0_0_10px_rgba(249,115,22,0.3)]";
                            } else if (status === 'I_OVERDUE') {
                                itemClass += "bg-red-900/40 border border-red-500/50 text-red-100";
                            } else if (title === 'ISSUE LIST') {
                                itemClass += "bg-slate-800/20 border-slate-700/50";
                            } else {
                                itemClass += "bg-slate-800/20 border-slate-700/50";
                            }
                            // --------------------------------------------------------
                            // [RED ZONE] VISUAL LOGIC END
                            // --------------------------------------------------------

                            return (
                                <div key={s.seatId} className={itemClass}>
                                    <span className="font-black text-[11px] w-5 text-slate-500 text-center font-mono font-bold">{s.seatId}</span>
                                    <span className={`flex-1 truncate text-[11px] font-bold text-slate-200`}>
                                        {s.rawName}
                                        {timeStr && <span className="text-[10px] text-cyan-300 font-mono tracking-tight ml-2">({timeStr})</span>}
                                    </span>
                                    <div className="flex gap-1.5 shrink-0">
                                        {(title === 'ISSUE LIST' || title === 'OVERDUE' || title === 'OUT NOW') && (
                                            <>
                                                <button onClick={() => onAction(s, 'RETURN')} className={`${title === 'OVERDUE' ? 'bg-red-600' : title === 'ISSUE LIST' ? 'bg-yellow-600' : 'bg-blue-600'} text-[10px] px-2.5 py-0.5 rounded text-white font-black hover:opacity-80 shadow-sm transition-all`}>복귀</button>
                                                <button onClick={() => onAction(s, 'DISMISS')} className="bg-purple-600 text-[10px] px-2.5 py-0.5 rounded text-white font-black hover:opacity-80 shadow-sm transition-all font-bold">하원</button>
                                            </>
                                        )}
                                        {title === 'SCHEDULED' && (
                                            <>
                                                {/* [RED ZONE] Cancel/Dismiss buttons only */}
                                                <button onClick={() => onAction(s, 'CANCEL_DEPART')} className="bg-orange-500 text-[10px] px-2.5 py-0.5 rounded text-white font-black hover:opacity-80 shadow-sm transition-all font-bold">취소</button>
                                                <button onClick={() => onAction(s, 'DISMISS')} className="bg-purple-600 text-[10px] px-2.5 py-0.5 rounded text-white font-black hover:opacity-80 shadow-sm transition-all font-bold">하원</button>
                                            </>
                                        )}
                                        {title === 'DISMISSED' && (
                                            <button onClick={() => onAction(s, 'CANCEL_DISMISS')} className="bg-slate-600 text-[10px] px-2.5 py-0.5 rounded text-white font-black hover:bg-slate-500 shadow-sm transition-all font-bold">취소</button>
                                        )}
                                        {/* [NEW] NOT ARRIVED: 등원확인 + 하원 */}
                                        {title === 'NOT ARRIVED' && (
                                            <>
                                                <button onClick={() => onAction(s, 'ARRIVED')} className="bg-amber-600 text-[10px] px-2.5 py-0.5 rounded text-white font-black hover:opacity-80 shadow-sm transition-all">등원확인</button>
                                                <button onClick={() => onAction(s, 'DISMISS')} className="bg-purple-600 text-[10px] px-2.5 py-0.5 rounded text-white font-black hover:opacity-80 shadow-sm transition-all font-bold">하원</button>
                                            </>
                                        )}
                                        {/* [NEW] ABSENT: 결석 취소(등원으로 전환)만 */}
                                        {title === 'ABSENT' && (
                                            <button onClick={() => onAction(s, 'ARRIVED')} className="bg-slate-600 text-[10px] px-2.5 py-0.5 rounded text-white font-black hover:bg-slate-500 shadow-sm transition-all">등원처리</button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const EditorModal = ({ student, onClose, onSave, onDelete }) => {
            const initializeSchText = (schedules) => {
                if (!Array.isArray(schedules) || schedules.length === 0) return "";
                const groups = {};
                schedules.forEach(s => {
                    const timeKey = `${s.startTime}~${s.endTime}`;
                    if (!groups[timeKey]) groups[timeKey] = [];
                    groups[timeKey].push(s.day);
                });
                const scheduleStr = Object.entries(groups).map(([time, days]) => {
                    const dayStr = days.join('');
                    return `${dayStr} ${time}`;
                }).join(' / ');
                return scheduleStr;
            };

            // [NEW] arrivalSchedule 배열 → 텍스트 역변환 함수
            const initializeArrivalText = (arrSched) => {
                if (!Array.isArray(arrSched) || arrSched.length === 0) return "";
                return arrSched.map(a => a.isAbsent ? `${a.day} X` : `${a.day} ${a.arrivalTime}`).join(' / ');
            };

            const [formData, setFormData] = useState({
                ...student,
                schText: initializeSchText(student.schedules),
                arrivalScheduleText: initializeArrivalText(student.arrivalSchedule)
            });
            const [isLinkView, setIsLinkView] = useState(!!student.linkUrl);
            const editorRef = useRef(null);

            const toggleHighlight = (color) => {
                editorRef.current.focus();
                const currentColor = document.queryCommandValue('backColor');
                const targetRGB = color === '#facc15' ? 'rgb(250, 204, 21)' : 'rgb(239, 68, 68)';
                if (currentColor.replace(/\s/g, '') === targetRGB.replace(/\s/g, '')) document.execCommand('backColor', false, 'transparent');
                else document.execCommand('backColor', false, color);
            };
            const handleToolbarAction = (e, action) => {
                e.preventDefault();
                action();
            };

            const handleSave = (shouldClose = true) => {
                const parsedSchedules = RegularLogic.parseFromString(formData.schText);
                const parsedArrival = parseArrivalSchedule(formData.arrivalScheduleText || ""); // [NEW]
                const hasIssue = formData.issueMemo && formData.issueMemo.trim().length > 0;

                let cleanPaymentDate = formData.nextPaymentDate;
                if (cleanPaymentDate === "") cleanPaymentDate = null;
                const updates = {
                    ...formData,
                    schedules: parsedSchedules,
                    arrivalSchedule: parsedArrival, // [NEW]
                    nextPaymentDate: cleanPaymentDate,
                    isReturnedToday: hasIssue ? false : formData.isReturnedToday
                };
                onSave(updates, shouldClose);
            };

            const handleLinkSave = () => {
                handleSave(false);
                setIsLinkView(true);
            };

            return (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] backdrop-blur-md p-4 font-bold" onClick={onClose}>
                    <div className="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[95vh] fade-in" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950 shrink-0 font-bold">
                            <h2 className="text-lg font-black text-white uppercase tracking-tighter font-mono font-bold">STUDENT PROFILE ({formData.seatId})</h2>
                            <div className="flex items-center gap-4 font-bold">
                                <label className="inline-flex items-center cursor-pointer font-bold">
                                    <input type="checkbox" className="sr-only peer font-bold" checked={!formData.isManualOff} onChange={e => setFormData(p => ({ ...p, isManualOff: !e.target.checked }))} />
                                    <div className="w-10 h-5 bg-slate-700 rounded-full peer peer-checked:bg-emerald-500 relative transition-all after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5 shadow-inner font-bold"></div>
                                </label>
                                <button onClick={onClose} className="text-slate-500 hover:text-white transition-all font-bold"><Icon name="x" size={24} /></button>
                            </div>
                        </div>
                        <div className="flex-1 flex flex-col p-5 space-y-3 overflow-hidden bg-slate-900 shadow-inner font-bold">

                            {/* [FIX] NEW Name Input Field Added */}
                            <div className="space-y-1 shrink-0">
                                <label className="text-[10px] font-black text-slate-500 uppercase font-mono tracking-widest font-bold">NAME</label>
                                <input
                                    type="text"
                                    className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-[13px] font-bold text-white outline-none focus:border-blue-500 shadow-inner font-mono"
                                    value={formData.rawName || ""}
                                    onChange={e => setFormData(p => ({ ...p, rawName: e.target.value }))}
                                    placeholder="이름 입력"
                                />
                            </div>

                            <div className="space-y-1 shrink-0">
                                <label className="text-[10px] font-black text-slate-500 uppercase flex items-center gap-1.5 font-mono font-bold"><Icon name="link" size={12} /> LINK</label>
                                {isLinkView && formData.linkUrl ? (
                                    <div className="flex gap-2 items-center bg-slate-950 border border-slate-800 rounded-lg p-2">
                                        <a href={formatUrl(formData.linkUrl)} target="_blank" className="flex-1 text-[13px] text-blue-400 hover:text-blue-300 underline underline-offset-2 truncate font-mono">{formData.linkUrl}</a>
                                        <button onClick={() => setIsLinkView(false)} className="text-slate-500 hover:text-white px-2 text-[11px] font-bold">수정</button>
                                    </div>
                                ) : (
                                    <div className="flex gap-1.5 font-bold">
                                        <input type="text" className="flex-1 bg-slate-950 border border-cyan-900/30 rounded-lg p-2 text-[13px] text-cyan-100 outline-none focus:border-cyan-500 font-mono shadow-inner transition-all font-bold" placeholder="https://..." value={formData.linkUrl || ""} onChange={e => setFormData(p => ({ ...p, linkUrl: e.target.value }))} />
                                        <button onClick={handleLinkSave} className="bg-cyan-700 hover:bg-cyan-600 text-white text-[11px] font-black px-4 rounded-lg shadow-md active:scale-95 transition-all font-bold">저장</button>
                                        <button onClick={() => { setFormData(p => ({ ...p, linkUrl: "" })); }} className="bg-slate-700 hover:bg-slate-600 text-slate-300 text-[11px] font-black px-4 rounded-lg shadow-md transition-all font-bold">취소</button>
                                    </div>
                                )}
                            </div>
                            <div className="space-y-1 shrink-0"><label className="text-[10px] font-black text-slate-500 uppercase font-mono tracking-widest font-bold">Regular Schedule</label><textarea className="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 text-[13px] font-mono text-slate-200 h-[90px] outline-none focus:border-blue-500 resize-none font-bold" value={formData.schText || ""} onChange={e => setFormData(p => ({ ...p, schText: e.target.value }))} /></div>
                            {/* [NEW] Arrival Schedule 입력 필드 */}
                            <div className="space-y-1 shrink-0">
                                <label className="text-[10px] font-black text-amber-500 uppercase font-mono tracking-widest font-bold flex items-center gap-1.5">
                                    <Icon name="clock" size={12} /> Arrival Schedule
                                </label>
                                <input
                                    type="text"
                                    className="w-full bg-slate-950 border border-amber-900/30 rounded-lg p-2.5 text-[13px] text-amber-100 outline-none focus:border-amber-500 font-bold shadow-inner font-mono"
                                    placeholder="월 17:30 / 화 18:00 / 수 X / 금 결석"
                                    value={formData.arrivalScheduleText || ""}
                                    onChange={e => setFormData(p => ({ ...p, arrivalScheduleText: e.target.value }))}
                                />
                                <div className="text-[10px] text-slate-600 font-mono">
                                    예) 월 17:30 / 화 18:00 / 수 X &nbsp;▸&nbsp; X 또는 결석 입력시 결석일 입력 미입력 요일은 미적용
                                </div>
                            </div>
                            <div className="space-y-1 shrink-0"><label className="text-[10px] font-black text-orange-500 uppercase font-mono tracking-widest font-bold">Issue Memo</label><input type="text" className="w-full bg-slate-950 border border-orange-950/20 rounded-lg p-2.5 text-[13px] text-orange-200 outline-none focus:border-orange-500 font-bold shadow-inner font-bold" value={formData.issueMemo || ""} placeholder="@병원 월 22:00~23:00" onChange={e => setFormData(p => ({ ...p, issueMemo: e.target.value }))} /></div>
                            <div className="space-y-1 shrink-0"><label className="text-[10px] font-black text-yellow-500 uppercase flex items-center gap-1.5 font-mono tracking-widest font-bold"><Icon name="credit-card" size={12} /> 다음 결제일</label><input type="date" className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-sm text-slate-200 outline-none focus:border-yellow-500 shadow-inner font-mono font-bold" value={formData.nextPaymentDate || ''} onChange={e => setFormData(p => ({ ...p, nextPaymentDate: e.target.value }))} /></div>
                            <div className="flex-1 flex flex-col min-h-0 overflow-hidden space-y-1.5 font-bold"><label className="text-[10px] font-black text-slate-500 uppercase flex items-center gap-1.5 font-mono shrink-0 tracking-widest font-bold"><Icon name="file-text" size={12} /> Memo Detail</label><div className="flex flex-wrap items-center gap-1 shrink-0 pb-0.5 font-bold"><button onMouseDown={(e) => handleToolbarAction(e, () => document.execCommand('bold'))} className="toolbar-btn font-black text-[12px] font-bold">B</button><button onMouseDown={(e) => handleToolbarAction(e, () => toggleHighlight('#facc15'))} className="toolbar-btn bg-yellow-400/10 text-yellow-600 font-bold">노랑</button><button onMouseDown={(e) => handleToolbarAction(e, () => toggleHighlight('#ef4444'))} className="toolbar-btn bg-red-400/10 text-red-500 font-black">빨강</button><div className="w-[1px] h-3 bg-slate-800 mx-0.5 font-bold"></div><button onMouseDown={(e) => handleToolbarAction(e, () => document.execCommand('insertText', false, '🔴'))} className="toolbar-btn text-[12px] font-bold">🔴</button><button onMouseDown={(e) => handleToolbarAction(e, () => document.execCommand('insertText', false, '⭐'))} className="toolbar-btn text-[12px] font-bold">⭐</button><button onMouseDown={(e) => handleToolbarAction(e, () => document.execCommand('insertText', false, '📌'))} className="toolbar-btn text-[12px] font-bold">📌</button></div><div ref={editorRef} contentEditable="true" onInput={() => setFormData(p => ({ ...p, memo: editorRef.current.innerHTML }))} dangerouslySetInnerHTML={{ __html: student.memo || "" }} className="flex-1 w-full bg-slate-950 border border-slate-800 rounded-lg p-4 text-[14px] text-slate-300 outline-none focus:border-blue-500 shadow-inner leading-relaxed font-mono overflow-y-auto custom-scrollbar rich-editor font-bold" /></div>
                        </div>
                        <div className="p-3 border-t border-slate-800 bg-slate-950 flex gap-2 shrink-0 font-bold"><button onClick={() => handleSave(true)} className="flex-1 bg-cyan-700 hover:bg-cyan-600 text-white font-black py-2.5 rounded-xl text-[11px] shadow-lg transition-all uppercase tracking-widest font-bold">Update Profile</button><button onClick={() => { if (window.confirm("초기화?")) onDelete(formData.seatId) }} className="flex-1 bg-slate-800 hover:bg-red-900 text-slate-400 hover:text-white font-black py-2.5 rounded-xl text-[11px] transition-all uppercase tracking-widest font-bold">Clear data</button></div>
                    </div>
                </div>
            );
        };

        const SettingsModal = ({ onClose, onResetAll, onFactoryReset, students, onBulkRestore }) => {
            const fileInputRef = useRef(null);
            const [importType, setImportType] = useState(null);
            const [pw, setPw] = useState("");
            const handleExport = (type) => {
                let content = "";
                let filename = `5A_Backup_${new Date().toISOString().split('T')[0]}`;
                if (type === 'JSON') {
                    // [Clean Export] Name Sanitization (Remove trailing colon)
                    const safeData = students.map(s => ({
                        seatId: s.seatId,
                        rawName: s.rawName ? s.rawName.trim().replace(/:+$/, '') : "",
                        schedules: s.schedules,
                        memo: s.memo,
                        issueMemo: s.issueMemo,
                        linkUrl: s.linkUrl,
                        nextPaymentDate: s.nextPaymentDate,
                        isManualOff: s.isManualOff,
                        arrivalSchedule: s.arrivalSchedule || []  // [NEW]
                    }));
                    content = JSON.stringify(safeData, null, 2);
                    filename += ".json";
                } else {
                    students.filter(s => s.rawName).forEach(s => {
                        const cleanName = s.rawName.trim().replace(/:+$/, ''); // Clean Export
                        if (type === 'MEMO') content += `${s.seatId} ${cleanName}: ${s.memo || "(없음)"}\n`;
                        if (type === 'ISSUE') content += `${s.seatId} ${cleanName}: ${s.issueMemo || "(없음)"}\n`;
                        if (type === 'SCH') content += `${s.seatId} ${cleanName}: ${s.schedules.map(sc => `${sc.day} ${sc.startTime}~${sc.endTime}`).join(' / ')}\n`;
                    });
                    filename += `_${type}.txt`;
                }
                const blob = new Blob([content], { type: type === 'JSON' ? 'application/json' : 'text/plain' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                // Fix: Append to body
                link.click();
                document.body.removeChild(link); // Fix: Remove after click
                URL.revokeObjectURL(url);
                alert("✅ 전체 백업 파일이 생성되었습니다.");
            };

            const triggerFile = (type) => { setImportType(type); fileInputRef.current.click(); };
            const handleFileLoad = (e) => {
                console.log(">>> [DEBUG] 파일 선택 이벤트 발생");
                const file = e.target.files[0];
                if (!file) {
                    console.log(">>> [DEBUG] 파일이 선택되지 않음");
                    return;
                }
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        console.log(">>> [DEBUG] 파일 읽기 성공, 파싱 시작");
                        const content = event.target.result;
                        let count = 0;
                        let preview = "";
                        if (importType === 'JSON') {
                            const parsed = JSON.parse(content);
                            count = parsed.length;
                            preview = "전체 데이터 (JSON)";
                        } else {
                            const lines = content.split('\n');
                            count = lines.filter(l => l.match(/^(\d+)\s+(.*?):\s*(.*)$/)).length;
                            if (count === 0) {
                                // [Retry] Double Colon Parsing
                                count = lines.filter(l => l.match(/^(\d+)\s+(.*?):+\s*(.*)$/)).length;
                            }
                            if (importType === 'SCH') preview = "스케줄 데이터 (TXT)";
                            else if (importType === 'MEMO') preview = "메모 데이터 (TXT)";
                            else if (importType === 'ISSUE') preview = "이슈 데이터 (TXT)";
                        }

                        if (count === 0) {
                            alert("유효한 데이터가 확인되지 않았습니다. 파일 형식을 확인해주세요.");
                            e.target.value = null;
                            return;
                        }

                        if (window.confirm(`[${preview}] 복구\n\n총 ${count}건의 유효한 데이터가 확인되었습니다.\n현재 데이터를 덮어쓰고 복구를 진행하시겠습니까?`)) {
                            const data = importType === 'JSON' ? JSON.parse(content) : content;
                            console.log(">>> [DEBUG] onBulkRestore 함수 호출 시도");
                            onBulkRestore(data, importType);
                        }
                    } catch (err) {
                        console.error(">>> [DEBUG] 파일 처리 중 에러:", err);
                        alert("파일 처리 실패: " + err.message);
                    }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[200] backdrop-blur-md p-4" onClick={onClose}>
                    <div className="bg-slate-900 border border-slate-700 w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col fade-in" onClick={e => e.stopPropagation()}>
                        {/* [FIX] Input tag with onClick reset to allow re-selection of same file */}
                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileLoad} onClick={(e) => e.target.value = null} accept={importType === 'JSON' ? '.json' : '.txt'} />

                        <div className="p-6 border-b border-slate-800 flex items-center gap-3 text-white bg-slate-950">
                            <Icon name="settings" size={24} /> <h2 className="text-xl font-black font-mono">환경설정</h2>
                            <button onClick={onClose} className="ml-auto text-slate-500 hover:text-white"><Icon name="x" size={24} /></button>
                        </div>

                        <div className="p-8 space-y-6 overflow-y-auto max-h-[75vh] custom-scrollbar bg-slate-900">
                            <div className="space-y-3">
                                <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><Icon name="database" size={14} /> 데이터 관리</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={() => handleExport('JSON')} className="btn-action-flat bg-emerald-600/80 w-full h-10 font-bold rounded-lg text-white">💾 전체 백업 (JSON)</button>
                                    <button onClick={() => triggerFile('JSON')} className="btn-action-flat bg-orange-600/80 w-full h-10 font-bold rounded-lg text-white">📂 전체 복구 (JSON)</button>
                                </div>
                                <div className="grid grid-cols-2 gap-2 mt-1">
                                    <button onClick={() => handleExport('SCH')} className="btn-action-flat bg-blue-600/80 w-full h-10 font-bold rounded-lg text-white text-[11px]">📋 스케줄 내보내기 (TXT)</button>
                                    <button onClick={() => triggerFile('SCH')} className="btn-action-flat bg-blue-500/50 w-full h-10 font-bold rounded-lg text-white text-[11px]">📥 스케줄 복구 (TXT)</button>
                                </div>
                                <div className="grid grid-cols-2 gap-2 mt-1">
                                    <button onClick={() => handleExport('MEMO')} className="btn-action-flat bg-purple-600/80 h-10 text-[11px] font-bold rounded-lg text-white">📄 메모 내보내기 (TXT)</button>
                                    <button onClick={() => triggerFile('MEMO')} className="btn-action-flat bg-purple-500/50 h-10 text-[11px] font-bold rounded-lg text-white">📥 메모 복구 (TXT)</button>
                                </div>
                                <div className="grid grid-cols-2 gap-2 mt-1">
                                    <button onClick={() => handleExport('ISSUE')} className="btn-action-flat bg-orange-500/80 h-10 text-[11px] font-bold rounded-lg text-white">🔥 이슈 내보내기 (TXT)</button>
                                    <button onClick={() => triggerFile('ISSUE')} className="btn-action-flat bg-orange-400/50 h-10 text-[11px] font-bold rounded-lg text-white">📥 이슈 복구 (TXT)</button>
                                </div>
                                <button className="btn-action-flat bg-teal-600/80 w-full h-10 font-bold rounded-lg text-white mt-1 shadow-lg">☁️ 마이그레이션</button>
                            </div>
                            <div className="space-y-3 pt-4 border-t border-slate-800">
                                <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><Icon name="terminal" size={14} /> 시스템 제어</h3>
                                {/* [RED ZONE] Daily Reset Logic */}
                                <button onClick={() => { if (window.confirm("오늘의 모든 상태 기록을 자정 기준으로 초기화합니까?")) onResetAll(); }} className="w-full bg-red-600 hover:bg-red-500 text-white text-[12px] font-black p-4 rounded-xl flex items-center justify-center gap-3 transition-all shadow-xl shadow-red-950/40">
                                    <Icon name="refresh-ccw" size={18} /> 일일 상태 리셋
                                </button>
                                <button onClick={() => { if (window.confirm("⚠️ 경고: 모든 좌석의 데이터가 완전히 삭제됩니다.\n이 작업은 되돌릴 수 없습니다.\n\n정말로 전체 데이터를 초기화하시겠습니까?")) onFactoryReset(); }} className="w-full bg-slate-900 border-2 border-red-800/50 hover:bg-red-950/50 text-red-500 hover:text-red-400 text-[12px] font-black p-4 rounded-xl flex items-center justify-center gap-3 transition-all shadow-lg mt-2 group">
                                    <Icon name="trash-2" size={18} className="group-hover:animate-bounce" /> ⚠️ 전체 데이터 초기화 (Factory Reset)
                                </button>
                            </div>
                            <div className="space-y-3 pt-4 border-t border-slate-800">
                                <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><Icon name="lock" size={14} /> 비밀번호 변경</h3>
                                <div className="bg-slate-950 p-4 rounded-xl space-y-3 border border-slate-800">
                                    <input type="password" placeholder="새 비밀번호" className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white outline-none" value={pw} onChange={e => setPw(e.target.value)} />
                                    <input type="password" placeholder="비밀번호 확인" className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white outline-none" />
                                    <button className="w-full bg-cyan-700 hover:bg-cyan-600 text-white font-bold py-2.5 rounded-lg transition-all text-xs">비밀번호 변경</button>
                                </div>
                                <div className="bg-orange-950/20 p-4 rounded-xl border border-orange-900/30 space-y-3 mt-2">
                                    <div className="text-[11px] text-orange-500 font-bold flex items-center gap-1">⚠️ 비밀번호 초기화</div>
                                    <button className="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-2.5 rounded-lg transition-all text-xs">초기화</button>
                                </div>
                            </div>
                        </div>
                        <button onClick={onClose} className="bg-slate-800 hover:bg-slate-700 text-slate-400 p-5 text-sm font-black border-t border-slate-700 uppercase tracking-widest font-mono">닫기</button>
                    </div>
                </div>
            );
        };

        // [3-2] Missing Component (AssignModal) Added for Stability
        const AssignModal = ({ onClose, onAssign, onDelete }) => {
            const [text, setText] = useState("");
            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[200] backdrop-blur-md p-4" onClick={onClose}>
                    <div className="bg-slate-900 border border-slate-700 w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden flex flex-col fade-in" onClick={e => e.stopPropagation()}>
                        <div className="p-6 border-b border-slate-800 flex items-center gap-3 text-white bg-slate-950">
                            <h2 className="text-xl font-black font-mono">좌석 배정 / 관리</h2>
                            <button onClick={onClose} className="ml-auto text-slate-500 hover:text-white"><Icon name="x" size={24} /></button>
                        </div>
                        <div className="p-6 space-y-4">
                            <textarea
                                className="w-full h-40 bg-slate-950 border border-slate-800 rounded-lg p-4 text-xs font-mono text-slate-300 outline-none focus:border-blue-500"
                                placeholder={`예시:\n1 홍길동 1400-1600\n2 김철수 15:00~18:00`}
                                value={text}
                                onChange={e => setText(e.target.value)}
                            />
                            <div className="flex gap-2">
                                <button onClick={() => { onAssign(text); onClose(); }} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl text-xs transition-all">
                                    일괄 배정
                                </button>
                            </div>
                            <div className="border-t border-slate-800 pt-4 mt-2">
                                <button onClick={() => { onDelete(); onClose(); }} className="w-full bg-red-900/30 hover:bg-red-900/50 border border-red-900/50 text-red-500 font-black py-3 rounded-xl text-xs transition-all flex items-center justify-center gap-2">
                                    <Icon name="trash" size={14} /> 선택 좌석 초기화
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [now, setNow] = useState(new Date());
            const [selectedSeat, setSelectedSeat] = useState(null);
            const [selectedSeats, setSelectedSeats] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [refreshCounter, setRefreshCounter] = useState(60);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isHideEmpty, setIsHideEmpty] = useState(false);
            const [isAssignOpen, setIsAssignOpen] = useState(false);
            const [history, setHistory] = useState([]);
            // ==========================================
            // [4] LOCAL STORAGE INIT & SYNC
            // ==========================================
            const fetchData = async () => {
                setLoading(true);
                try {
                    const { data, error } = await supabase
                        .from('tracker_seats')
                        .select('*')
                        .order('seat_id');
                    if (error) throw error;
                    const mapped = data.map(row => ({
                        seatId: row.seat_id, rawName: row.raw_name || '',
                        schedules: row.schedules || [], memo: row.memo || '',
                        issueMemo: row.issue_memo || '', linkUrl: row.link_url || '',
                        nextPaymentDate: row.next_payment_date || null,
                        isManualOff: row.is_manual_off || false,
                        isReturnedToday: row.is_returned_today || false,
                        isDismissedToday: row.is_dismissed_today || false,
                        memoIcons: row.memo_icons || [],
                        arrivalSchedule: row.arrival_schedule || [],
                        isArrivedToday: row.is_arrived_today || false
                    }));
                    setStudents(mapped);
                } catch (e) {
                    console.error('Supabase fetch error:', e);
                } finally {
                    setLoading(false);
                }
            };
            useEffect(() => {
                const timer = setInterval(() => setNow(new Date()), 1000);
                const sync = setInterval(() => {
                    if (!selectedSeat) {
                        setRefreshCounter(prev => { if (prev <= 1) { fetchData(); return 60; } return prev - 1; });
                    }
                }, 1000);
                return () => { clearInterval(timer); clearInterval(sync); };
            }, [selectedSeat]);
            useEffect(() => {
                fetchData();
                const channel = supabase.channel('tracker_realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'tracker_seats' }, fetchData)
                    .subscribe();
                return () => supabase.removeChannel(channel);
            }, []);

            // Auto-scroll Logic
            useEffect(() => {
                if (!searchQuery) return;
                const match = students.find(s => s.rawName && s.rawName.toLowerCase().includes(searchQuery.toLowerCase()));
                if (match) {
                    const el = document.getElementById(`seat-${match.seatId}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, [searchQuery, students]);
            // ----------------------------------------------------------------------
            // 🚨 [RED ZONE] LOCAL STORAGE UPDATE & RESTORE LOGIC 🚨
            // ----------------------------------------------------------------------
            const updateDB = async (seatId, updates, saveHistory = true) => {
                if (saveHistory) {
                    const targetStudent = students.find(s => s.seatId === seatId);
                    if (targetStudent) {
                        setHistory(prev => [...prev.slice(-49), { seatId, previousData: { ...targetStudent } }]);
                    }
                }

                const target = students.find(s => s.seatId === seatId) || {};
                const merged = { ...target, ...updates };
                setStudents(prev => prev.map(s => s.seatId === seatId ? merged : s));
                const { error } = await supabase.from('tracker_seats').upsert(toDbRow(merged), { onConflict: 'seat_id' });
                if (error) console.error('Supabase updateDB error:', error);
            };

            const handleBulkRestore = async (data, type) => {
                setLoading(true);
                try {
                    let newStudents = [...students];
                    let successCount = 0;

                    if (type === 'JSON') {
                        const list = Array.isArray(data) ? data : [];
                        console.log("JSON 데이터 로드 갯수:", list.length);

                        list.forEach(s => {
                            // [긴급 수정] ID 매칭 무결성 점검 로직 (String 비교)
                            const idx = newStudents.findIndex(ns => {
                                const isMatch = String(ns.seatId) === String(s.seatId);

                                // [요청하신 디버깅용 로그 - 매칭 성공시에만 로그 출력하여 콘솔 폭주 방지]
                                if (isMatch) {
                                    console.log("매칭 성공(상세):", {
                                        파일에서_읽은_ID: s.seatId,
                                        파일ID_타입: typeof s.seatId,
                                        화면의_좌석ID: ns.seatId,
                                        화면ID_타입: typeof ns.seatId,
                                        변환후_비교결과: isMatch
                                    });
                                }
                                return isMatch;
                            });

                            if (idx !== -1) {
                                // Sanitization: 이름 뒤 콜론 제거 및 날짜 null 처리
                                let cleanName = s.rawName || "";
                                if (cleanName.endsWith(':')) cleanName = cleanName.slice(0, -1);
                                let cleanDate = s.nextPaymentDate;
                                if (cleanDate === "") cleanDate = null;
                                newStudents[idx] = {
                                    ...newStudents[idx],
                                    rawName: cleanName,
                                    schedules: s.schedules || [],
                                    memo: s.memo || "",
                                    issueMemo: s.issueMemo || "",
                                    linkUrl: s.linkUrl || "",
                                    nextPaymentDate: cleanDate,
                                    isManualOff: s.isManualOff || false,
                                    arrivalSchedule: s.arrivalSchedule || []  // [NEW]
                                };
                                successCount++;
                            } else {
                                // 매칭 실패 로그 (샘플)
                                if (successCount === 0) {
                                    console.warn("매칭 실패 샘플:", { 파일ID: s.seatId, 타입: typeof s.seatId });
                                }
                            }
                        });
                    } else {
                        // TXT Restore (기존 파싱 로직 유지 + ID String 비교 적용)
                        const lines = data.split('\n');
                        lines.forEach(line => {
                            // 정규식 유지
                            const match = line.match(/^(\d+)\s+(.*?):+\s*(.*)$/);
                            if (match) {
                                const sid = match[1]; // 문자열 상태
                                let name = match[2].trim();
                                if (name.endsWith(':')) name = name.slice(0, -1);
                                const content = match[3].trim() === "(없음)" ? "" : match[3].trim();

                                // [수정] String 변환 비교
                                const idx = newStudents.findIndex(ns => String(ns.seatId) === String(sid));

                                if (idx !== -1) {
                                    // [중요] 이름 강제 업데이트
                                    if (name) newStudents[idx].rawName = name;

                                    if (type === 'MEMO') newStudents[idx].memo = content;
                                    if (type === 'ISSUE') newStudents[idx].issueMemo = content;
                                    if (type === 'SCH') newStudents[idx].schedules = RegularLogic.parseFromString(content);
                                    successCount++;
                                }
                            }
                        });
                    }

                    setStudents(newStudents);
                    await bulkSave(newStudents);
                    alert(`✅ 총 ${successCount}건의 데이터가 복구되었습니다.`);
                } catch (e) {
                    console.error(e);
                    alert("❌ 복구 중 오류가 발생했습니다: " + e.message);
                } finally {
                    setLoading(false);
                }
            };
            // ----------------------------------------------------------------------
            // 🚨 [RED ZONE END] LOGIC 🚨
            // ----------------------------------------------------------------------

            const handleHeaderAction = async () => {
                if (selectedSeats.length > 0) {
                    setSelectedSeats([]);
                    return;
                }
                if (history.length === 0) return;
                const lastAction = history[history.length - 1];
                setHistory(prev => prev.slice(0, -1));
                const { seatId, previousData } = lastAction;
                await updateDB(seatId, previousData, false);
            };

            const handleBulkUpdate = async (inputStr) => {
                setLoading(true);
                try {
                    const lines = inputStr.split('\n');
                    let newStudents = [...students];
                    for (const line of lines) {
                        const match = line.match(/^(\d+)\s+(.*?)\s+(.*)$/);
                        if (match) {
                            const seatId = parseInt(match[1]);
                            // [Fix] Clean Input Name
                            const name = match[2].replace(/:+$/, '').trim();
                            const schedule = RegularLogic.parseFromString(match[3]);

                            const idx = newStudents.findIndex(s => s.seatId === seatId);
                            if (idx !== -1) {
                                newStudents[idx] = { ...newStudents[idx], rawName: name, schedules: schedule };
                            }
                        }
                    }
                    setStudents(newStudents);
                    await bulkSave(newStudents);
                } finally { setLoading(false); }
            };
            const handleBatchDelete = async () => {
                if (window.confirm(`${selectedSeats.length}개 좌석의 데이터를 초기화하시겠습니까?`)) {
                    let newStudents = [...students];
                    for (const sid of selectedSeats) {
                        const idx = newStudents.findIndex(s => s.seatId === sid);
                        if (idx !== -1) {
                            newStudents[idx] = {
                                ...newStudents[idx],
                                rawName: "", schedules: [], memo: "", issueMemo: "",
                                linkUrl: "", nextPaymentDate: null, isManualOff: false
                            };
                        }
                    }
                    setStudents(newStudents);
                    await bulkSave(newStudents);
                    setSelectedSeats([]);
                }
            };
            // [RED ZONE] Daily Reset Logic: Force clear all daily flags
            const handleResetAll = async () => {
                try {
                    let newStudents = students.map(s => ({
                        ...s,
                        isManualOff: false,
                        issueMemo: "",
                        isReturnedToday: false,
                        isDismissedToday: false,
                        isArrivedToday: false  // [NEW] 일일 등원확인 초기화
                    }));
                    setStudents(newStudents);
                    await bulkSave(newStudents);
                } catch (e) {
                    console.warn("Daily reset error", e);
                }
                setIsSettingsOpen(false);
            };
            const handleFullFactoryReset = async () => {
                const initialData = Array.from({ length: 200 }, (_, i) => ({
                    seatId: i + 1, rawName: "", schedules: [], memo: "", issueMemo: "",
                    linkUrl: "", nextPaymentDate: null, isManualOff: false,
                    isReturnedToday: false, isDismissedToday: false, memoIcons: [],
                    arrivalSchedule: [], isArrivedToday: false  // [NEW]
                }));
                setStudents(initialData);
                await bulkSave(initialData);
                alert("✅ 전체 데이터가 안전하게 초기화되었습니다.");
                setIsSettingsOpen(false);
            };
            const stats = useMemo(() => {
                const active = students.filter(s => s.rawName && !s.isManualOff);
                const total = active.length;
                const overdue = active.filter(s => calculateStatus(s, now).includes("OVERDUE")).length;
                const out = active.filter(s => calculateStatus(s, now).includes("OUT")).length;
                // [NEW] NOT_ARRIVED / ABSENT는 inCenter에서 제외
                const notArrived = active.filter(s => calculateStatus(s, now) === "NOT_ARRIVED").length;
                const absent = active.filter(s => calculateStatus(s, now) === "ABSENT").length;
                const inCenter = total - out - overdue - notArrived - absent;
                return { total, overdue, out, inCenter, notArrived, absent };
            }, [students, now]);

            const sidebarData = useMemo(() => {
                const groups = { issues: [], overdue: [], out: [], scheduled: [], notArrived: [], absent: [], dismissed: [] };
                students.forEach(s => {
                    if (!s.rawName || s.isManualOff) return;
                    const status = calculateStatus(s, now);

                    if (s.isDismissedToday) {
                        groups.dismissed.push(s);
                        return;
                    }

                    // [NEW] 등원/결석 상태 먼저 분류
                    if (status === "NOT_ARRIVED") { groups.notArrived.push(s); return; }
                    if (status === "ABSENT") { groups.absent.push(s); return; }

                    const issues = IssueLogic.parse(s.issueMemo, now);
                    if (issues.length > 0) {
                        groups.issues.push(s);
                        return;
                    }

                    if (status.includes("OVERDUE")) groups.overdue.push(s);
                    else if (status.includes("OUT")) groups.out.push(s);
                    else if (status.includes("GOING_SOON")) groups.scheduled.push(s);
                });
                return groups;
            }, [students, now]);

            const handleSeatClick = (id) => {
                if (selectedSeats.includes(id)) setSelectedSeats(p => p.filter(sid => sid !== id));
                else if (selectedSeats.length > 0) setSelectedSeats(p => [...p, id]);
                else setSelectedSeat(id);
            };
            return (
                <div className="h-screen flex bg-slate-950 text-slate-200 select-none overflow-hidden fade-in text-xs font-bold">
                    <div className="flex-1 flex flex-col overflow-hidden relative border-r border-slate-800/30 shadow-2xl">
                        <header className="h-[72px] border-b border-slate-800 bg-slate-900/70 flex items-center justify-between px-6 shrink-0 z-30 backdrop-blur-lg shadow-xl">
                            <div className="flex items-center gap-10 font-bold">
                                <div className="flex flex-col">
                                    <div className="flex items-end font-black tracking-tighter uppercase font-mono leading-none">
                                        <span className="text-white text-2xl">5A</span>
                                        <span className="text-white text-xl ml-1.5">TRACKER</span>
                                        <span className="text-red-600 text-xl ml-1.5">LIVE</span>
                                        <span className="text-[10px] text-cyan-400 ml-3 mb-0.5 font-bold">ver.1.0 LITE</span>
                                    </div>
                                    <div className="flex items-center gap-4 text-[10px] font-bold mt-2 uppercase tracking-tighter">
                                        <div className="flex items-center gap-1.5 text-slate-400">TOTAL <span className="text-white font-black text-[12px] font-mono">{stats.total}</span></div>
                                        <div className="flex items-center gap-1.5 text-slate-400">IN-CENTER <span className="text-emerald-400 font-black text-[12px] font-mono">{stats.inCenter}</span></div>
                                        <div className="flex items-center gap-1.5 text-slate-400">OUT <span className="text-blue-400 font-black text-[12px] font-mono">{stats.out}</span></div>
                                        <div className="flex items-center gap-1.5 text-slate-400">OVERDUE <span className="text-red-500 font-black text-[12px] font-mono">{stats.overdue}</span></div>
                                        {stats.notArrived > 0 && <div className="flex items-center gap-1.5 text-slate-400">미등원 <span className="text-amber-400 font-black text-[12px] font-mono">{stats.notArrived}</span></div>}
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-1.5">
                                <button onClick={() => setIsAssignOpen(true)} className="header-action-btn bg-blue-600 text-white hover:bg-blue-500 shadow-lg border-transparent">좌석 배정</button>
                                <button onClick={() => setIsHideEmpty(!isHideEmpty)} className={`header-action-btn ${isHideEmpty ? 'bg-orange-500 border-orange-400 text-white' : 'bg-orange-600 border-transparent text-white hover:bg-orange-500'}`}>좌석 숨김</button>
                                <button onClick={fetchData} className="header-action-btn bg-cyan-600 text-white hover:bg-cyan-500 shadow-lg border-transparent">새로고침</button>
                                <button onClick={handleHeaderAction} className={`header-action-btn ${selectedSeats.length > 0 ? 'bg-rose-500 border-rose-400 text-white' : 'bg-purple-600 border-transparent text-white hover:bg-purple-500'}`}>취소({selectedSeats.length}/5)</button>
                                <button onClick={() => setIsSettingsOpen(true)} className="header-action-btn bg-yellow-500 text-slate-900 hover:bg-yellow-400 border-transparent gap-2 font-black">설정 <Icon name="settings" size={16} /></button>
                                <div className="relative ml-2 group">
                                    <Icon name="search" size={13} className="absolute left-3 top-2.5 text-slate-600 group-focus-within:text-cyan-400" />
                                    <input type="text" placeholder="검색..." className="bg-slate-900 border border-slate-800 rounded-md pl-9 pr-3 py-1.5 text-[11px] w-32 focus:w-44 focus:ring-1 focus:ring-cyan-500 outline-none transition-all placeholder-slate-600" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                </div>
                                <div className="ml-4 pl-4 border-l border-slate-800 flex items-center">
                                    <div className="bg-slate-900/80 border border-slate-800 rounded-lg px-4 py-1 font-mono text-[29px] font-black text-cyan-400 tracking-tighter min-w-[130px] text-center leading-none">
                                        {now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false })}
                                    </div>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 p-4 overflow-y-auto bg-slate-950 custom-scrollbar">
                            <div className="grid grid-cols-5 md:grid-cols-8 lg:grid-cols-10 gap-2 pb-20">
                                {students.map(s => (
                                    (!isHideEmpty || s.rawName) && (
                                        <StudentCard key={s.seatId} id={`seat-${s.seatId}`} student={s} now={now} onClick={() => handleSeatClick(s.seatId)} isSelected={selectedSeats.includes(s.seatId)} isHighlighted={searchQuery.length > 0 && s.rawName && s.rawName.toLowerCase().includes(searchQuery.toLowerCase())} />
                                    )
                                ))}
                            </div>
                        </main>
                    </div>

                    <aside className="w-[360px] bg-slate-900 border-l border-slate-800 flex flex-col shrink-0 shadow-2xl z-40 h-screen overflow-hidden">
                        <div className="p-8 bg-slate-950 border-b border-slate-800 flex flex-col items-center justify-center shrink-0 shadow-lg">
                            <div className="flex items-end font-black tracking-tighter uppercase font-mono leading-none gap-2">
                                <span className="text-white text-[24px] drop-shadow-md">TRACKING</span>
                                <span className="text-red-600 text-[28px] drop-shadow-[0_0_12px_rgba(220,38,38,0.7)] animate-pulse">NOW</span>
                            </div>
                            <div className="text-[11px] text-blue-400 font-black tracking-[0.25em] mt-3 uppercase font-mono bg-blue-900/30 px-4 py-1 rounded-full border border-blue-800/40">
                                자동 갱신 중 ({refreshCounter}S)
                            </div>
                        </div>
                        <div className="p-4 space-y-4 bg-slate-900/50 flex-1 overflow-y-auto custom-scrollbar border-t border-slate-800/30 font-bold">
                            <SidebarSection title="ISSUE LIST" data={sidebarData.issues} onAction={(s, t) => {
                                if (t === 'RETURN') updateDB(s.seatId, { isReturnedToday: false, isDismissedToday: false, issueMemo: "" });
                                // 이슈 종료 -> 정규 복귀
                                if (t === 'DISMISS') updateDB(s.seatId, { isDismissedToday: true, isReturnedToday: false });
                            }} now={now} />
                            <SidebarSection title="OVERDUE" data={sidebarData.overdue} onAction={(s, t) => {
                                if (t === 'RETURN') updateDB(s.seatId, { isReturnedToday: true, isDismissedToday: false, issueMemo: "" });
                                // 강제 복귀
                                if (t === 'DISMISS') updateDB(s.seatId, { isDismissedToday: true, isReturnedToday: false });
                            }} now={now} />
                            <SidebarSection title="OUT NOW" data={sidebarData.out} onAction={(s, t) => {
                                if (t === 'RETURN') updateDB(s.seatId, { isReturnedToday: true, isDismissedToday: false, issueMemo: "" });
                                // 강제 복귀
                                if (t === 'DISMISS') updateDB(s.seatId, { isDismissedToday: true, isReturnedToday: false });
                            }} now={now} />
                            <SidebarSection title="SCHEDULED" data={sidebarData.scheduled} onAction={(s, t) => {
                                if (t === 'DEPART') {
                                    // DEPART Logic REMOVED
                                }
                                if (t === 'CANCEL_DEPART') { updateDB(s.seatId, { isReturnedToday: true, issueMemo: "" }); }
                                if (t === 'DISMISS') { updateDB(s.seatId, { isDismissedToday: true, isReturnedToday: false }); }
                            }} now={now} />
                            {/* [NEW] NOT ARRIVED 섹션: 등원확인 클릭 시 isArrivedToday=true */}
                            <SidebarSection title="NOT ARRIVED" data={sidebarData.notArrived} onAction={(s, t) => {
                                if (t === 'ARRIVED') updateDB(s.seatId, { isArrivedToday: true });
                                if (t === 'DISMISS') updateDB(s.seatId, { isDismissedToday: true, isReturnedToday: false });
                            }} now={now} />
                            {/* [NEW] ABSENT 섹션: 등원처리 클릭 시 isArrivedToday=true로 강제 등원 */}
                            <SidebarSection title="ABSENT" data={sidebarData.absent} onAction={(s, t) => {
                                if (t === 'ARRIVED') updateDB(s.seatId, { isArrivedToday: true });
                            }} now={now} />
                            <SidebarSection title="DISMISSED" data={sidebarData.dismissed} onAction={(s, t) => {
                                if (t === 'CANCEL_DISMISS') updateDB(s.seatId, { isDismissedToday: false, isReturnedToday: true });
                            }} now={now} />
                        </div>
                    </aside>

                    {selectedSeat && (
                        <EditorModal
                            student={students.find(s => s.seatId === selectedSeat)}
                            onClose={() => setSelectedSeat(null)}
                            onSave={async (upd, shouldClose = true) => { await updateDB(selectedSeat, upd); if (shouldClose) setSelectedSeat(null); }}
                            onDelete={async (id) => { await updateDB(id, { rawName: "", schedules: [], memo: "", issueMemo: "", linkUrl: "", nextPaymentDate: null, isManualOff: false }); setSelectedSeat(null); }}
                        />
                    )}

                    {isSettingsOpen && (
                        <SettingsModal
                            onResetAll={handleResetAll}
                            onFactoryReset={handleFullFactoryReset}
                            students={students}
                            onBulkRestore={handleBulkRestore}
                            onClose={() => setIsSettingsOpen(false)}
                        />
                    )}
                    {isAssignOpen && <AssignModal onClose={() => setIsAssignOpen(false)} onAssign={handleBulkUpdate} onDelete={handleBatchDelete} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
